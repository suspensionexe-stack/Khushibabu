<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Khushi 🌸</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');

        /* Smooth Animated Gradient Background */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #ffe6ea, #ffc3d1, #fbd3e9, #ffdfd3);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* Prevents scrolling so background elements stay put */
            text-align: center;
            color: #5a3e46;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Full Page Background Doodles */
        .bg-doodle {
            position: absolute;
            opacity: 0.5; /* Keeps them soft so they don't distract from reading */
            z-index: 0; /* Keeps them behind the main box */
            animation: float-bg 5s ease-in-out infinite;
            pointer-events: none; /* Prevents them from being clicked */
        }

        @keyframes float-bg {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(10deg); }
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 154, 171, 0.4);
            position: relative;
            z-index: 10; /* Keeps the white box on top of the background doodles */
            min-height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 80%;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
        }

        .page.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .text-display {
            font-size: 1.6rem;
            line-height: 1.7;
            margin-bottom: 30px;
            min-height: 120px;
        }

        /* FIX FOR SPACES BETWEEN WORDS */
        .word {
            opacity: 0;
            display: inline-block;
            margin-right: 0.3em; /* This guarantees a perfect space between every word! */
            transform: translateY(10px);
            animation: wordFadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes wordFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        button {
            background: linear-gradient(135deg, #ff9aab, #ff758c);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s ease;
            margin: 10px;
        }

        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 117, 140, 0.6);
        }

        .hidden {
            opacity: 0;
            transform: translateY(15px);
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* Box Doodles (Kept close to the box) */
        .doodle {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.8;
            animation: float 4s ease-in-out infinite;
        }

        .d1 { top: -25px; left: -25px; animation-delay: 0s; }
        .d2 { bottom: -25px; right: -25px; animation-delay: 1s; font-size: 2rem; }
        .d3 { top: 40%; left: -35px; animation-delay: 2s; font-size: 1.8rem; }
        .d4 { top: 15%; right: -25px; animation-delay: 0.5s; font-size: 2.2rem; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(8deg); }
        }

        #btn-no {
            position: relative;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
        }
    </style>
</head>
<body>

    <!-- Background Audio -->
    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <!-- NEW: Full Page Background Cute Doodles scattered everywhere -->
    <div class="bg-doodle" style="top: 5%; left: 10%; font-size: 3rem; animation-delay: 0s;">🌸</div>
    <div class="bg-doodle" style="top: 20%; right: 15%; font-size: 2.5rem; animation-delay: 1s;">🎀</div>
    <div class="bg-doodle" style="top: 70%; left: 8%; font-size: 3.5rem; animation-delay: 2s;">🧸</div>
    <div class="bg-doodle" style="top: 80%; right: 10%; font-size: 2.8rem; animation-delay: 0.5s;">💖</div>
    <div class="bg-doodle" style="top: 40%; left: 15%; font-size: 2rem; animation-delay: 3s;">✨</div>
    <div class="bg-doodle" style="top: 50%; right: 25%; font-size: 2.5rem; animation-delay: 1.5s;">🍓</div>
    <div class="bg-doodle" style="top: 15%; left: 40%; font-size: 2.2rem; animation-delay: 2.5s;">🌷</div>
    <div class="bg-doodle" style="top: 85%; left: 45%; font-size: 3rem; animation-delay: 0.8s;">💌</div>
    <div class="bg-doodle" style="top: 30%; left: 80%; font-size: 2.5rem; animation-delay: 1.2s;">☁️</div>
    <div class="bg-doodle" style="top: 60%; left: 85%; font-size: 3rem; animation-delay: 2.2s;">🦋</div>
    <div class="bg-doodle" style="top: 10%; right: 40%; font-size: 2.8rem; animation-delay: 1.8s;">🌻</div>
    <div class="bg-doodle" style="top: 85%; right: 30%; font-size: 2.3rem; animation-delay: 0.3s;">🩰</div>

    <div class="container">
        <!-- Box Doodles -->
        <div class="doodle d1">🌸</div>
        <div class="doodle d2">✨</div>
        <div class="doodle d3">💖</div>
        <div class="doodle d4">🦋</div>

        <div id="page1" class="page active">
            <div class="text-display" id="text1"></div>
            <button id="btn1" class="hidden" onclick="nextPage(1)">Open 💌</button>
        </div>

        <div id="page2" class="page">
            <div class="text-display" id="text2"></div>
            <button id="btn2" class="hidden" onclick="nextPage(2)">Next 🌻</button>
        </div>

        <div id="page3" class="page">
            <div class="text-display" id="text3"></div>
            <button id="btn3" class="hidden" onclick="nextPage(3)">Keep Reading 🥺</button>
        </div>

        <div id="page4" class="page">
            <div class="text-display" id="text4"></div>
            <button id="btn4" class="hidden" onclick="nextPage(4)">One last thing... 💓</button>
        </div>

        <div id="page5" class="page">
            <div class="text-display" id="text5"></div>
            <div id="btn-container5" class="hidden">
                <button id="btn-yes" onclick="accepted()">Yes! 🥰</button>
                <button id="btn-no" onmouseover="moveNoButton()">No 🙈</button>
            </div>
        </div>
    </div>

    <script>
        const scripts = [
            "Hi Khushi! 👋 I made something little for you. Ready?", 
            "First of all... how is your health lately? 🌻 Please make sure you are taking care of yourself, eating on time, and resting. Your smile means the world to me. ✨", 
            "I know we've talked about this, and I know you cherish me as your best friend. But I just had to be honest with my heart one more time. 💖", 
            "Every moment with you feels like magic. You're the kindest, most beautiful soul I know. I can't help but fall for you a little more every day. 🦋", 
            "So, I have to ask... Khushi, will you be my girlfriend? 🌹" 
        ];

        let musicStarted = false;

        function typeWriter(text, elementId, buttonId) {
            const element = document.getElementById(elementId);
            const button = document.getElementById(buttonId);
            element.innerHTML = ""; 
            
            const words = text.split(" ");
            
            words.forEach((word, index) => {
                const span = document.createElement("span");
                span.textContent = word; // Spaces are now handled cleanly by CSS margin-right
                span.className = "word";
                span.style.animationDelay = `${index * 0.15}s`;
                element.appendChild(span);
            });

            const totalTime = (words.length * 150) + 500;
            setTimeout(() => {
                button.classList.remove("hidden");
                button.classList.add("visible");
            }, totalTime);
        }

        function nextPage(currentPage) {
            if (!musicStarted) {
                document.getElementById('bg-music').play();
                musicStarted = true;
            }

            const currentDiv = document.getElementById(`page${currentPage}`);
            const nextDiv = document.getElementById(`page${currentPage + 1}`);

            currentDiv.style.opacity = '0';
            currentDiv.style.transform = 'translateY(-20px)';

            setTimeout(() => {
                currentDiv.classList.remove('active');
                currentDiv.style.opacity = '';
                currentDiv.style.transform = '';

                nextDiv.classList.add('active');
                
                let btnId = (currentPage + 1) === 5 ? 'btn-container5' : `btn${currentPage + 1}`;
                typeWriter(scripts[currentPage], `text${currentPage + 1}`, btnId);
                
            }, 600); 
        }

        window.onload = () => {
            typeWriter(scripts[0], "text1", "btn1");
        };

        function moveNoButton() {
            const btn = document.getElementById('btn-no');
            const x = (Math.random() * 200) - 100; 
            const y = (Math.random() * 150) - 75; 
            btn.style.transform = `translate(${x}px, ${y}px)`;
        }

        function accepted() {
            const page5 = document.getElementById('page5');
            page5.style.opacity = '0';
            
            setTimeout(() => {
                page5.innerHTML = `
                    <div style="animation: wordFadeIn 1s ease forwards;">
                        <h1 style="color: #ff477e; font-size: 2.5rem;">YAYYY! 🎉</h1>
                        <p style="font-size: 1.5rem; line-height: 1.5;">I promise to make you the happiest! ❤️🥰💐</p>
                    </div>`;
                page5.style.opacity = '1';
            }, 600);
        }
    </script>
</body>
</html>
