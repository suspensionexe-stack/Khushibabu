<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Khushi 🌸</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');

        /* Smooth Animated Gradient Background */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #ffe6ea, #ffc3d1, #fbd3e9, #ffdfd3);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
            color: #5a3e46;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); /* Frosted glass effect */
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 154, 171, 0.3);
            position: relative;
            min-height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Page Transition Animations */
        .page {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 80%;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
        }

        .page.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .text-display {
            font-size: 1.6rem;
            line-height: 1.7;
            margin-bottom: 30px;
            min-height: 120px;
        }

        /* Smooth Word Reveal */
        .word {
            opacity: 0;
            display: inline-block;
            transform: translateY(10px);
            animation: wordFadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes wordFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Button Styling & Hover Effects */
        button {
            background: linear-gradient(135deg, #ff9aab, #ff758c);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s ease;
            margin: 10px;
        }

        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 117, 140, 0.6);
        }

        .hidden {
            opacity: 0;
            transform: translateY(15px);
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* Doodles */
        .doodle {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.7;
            animation: float 4s ease-in-out infinite;
        }

        .d1 { top: -25px; left: -25px; animation-delay: 0s; }
        .d2 { bottom: -25px; right: -25px; animation-delay: 1s; font-size: 2rem; }
        .d3 { top: 40%; left: -35px; animation-delay: 2s; font-size: 1.8rem; }
        .d4 { top: 15%; right: -25px; animation-delay: 0.5s; font-size: 2.2rem; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(8deg); }
        }

        /* Smooth Evading No Button */
        #btn-no {
            position: relative;
            /* The transition makes it glide smoothly when JS changes its transform */
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
        }
    </style>
</head>
<body>

    <!-- Background Audio -->
    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="doodle d1">🌸</div>
        <div class="doodle d2">✨</div>
        <div class="doodle d3">💖</div>
        <div class="doodle d4">🦋</div>

        <div id="page1" class="page active">
            <div class="text-display" id="text1"></div>
            <button id="btn1" class="hidden" onclick="nextPage(1)">Open 💌</button>
        </div>

        <div id="page2" class="page">
            <div class="text-display" id="text2"></div>
            <button id="btn2" class="hidden" onclick="nextPage(2)">Next 🌻</button>
        </div>

        <div id="page3" class="page">
            <div class="text-display" id="text3"></div>
            <button id="btn3" class="hidden" onclick="nextPage(3)">Keep Reading 🥺</button>
        </div>

        <div id="page4" class="page">
            <div class="text-display" id="text4"></div>
            <button id="btn4" class="hidden" onclick="nextPage(4)">One last thing... 💓</button>
        </div>

        <div id="page5" class="page">
            <div class="text-display" id="text5"></div>
            <div id="btn-container5" class="hidden">
                <button id="btn-yes" onclick="accepted()">Yes! 🥰</button>
                <button id="btn-no" onmouseover="moveNoButton()">No 🙈</button>
            </div>
        </div>
    </div>

    <script>
        const scripts = [
            "Hi Khushi! 👋 I made something little for you. Ready?", 
            "First of all... how is your health lately? 🌻 Please make sure you are taking care of yourself, eating on time, and resting. Your smile means the world to me. ✨", 
            "I know we've talked about this, and I know you cherish me as your best friend. But I just had to be honest with my heart one more time. 💖", 
            "Every moment with you feels like magic. You're the kindest, most beautiful soul I know. I can't help but fall for you a little more every day. 🦋", 
            "So, I have to ask... Khushi, will you be my girlfriend? 🌹" 
        ];

        let musicStarted = false;

        // Upgraded Smooth Typewriter Function
        function typeWriter(text, elementId, buttonId) {
            const element = document.getElementById(elementId);
            const button = document.getElementById(buttonId);
            element.innerHTML = ""; 
            
            const words = text.split(" ");
            
            words.forEach((word, index) => {
                const span = document.createElement("span");
                span.textContent = word + " ";
                span.className = "word";
                // Stagger the animation delay for each word to create a flowing effect
                span.style.animationDelay = `${index * 0.15}s`;
                element.appendChild(span);
            });

            // Calculate total time for text to finish appearing, then fade in the button smoothly
            const totalTime = (words.length * 150) + 500;
            setTimeout(() => {
                button.classList.remove("hidden");
                button.classList.add("visible");
            }, totalTime);
        }

        // Upgraded Smooth Page Transition
        function nextPage(currentPage) {
            if (!musicStarted) {
                document.getElementById('bg-music').play();
                musicStarted = true;
            }

            const currentDiv = document.getElementById(`page${currentPage}`);
            const nextDiv = document.getElementById(`page${currentPage + 1}`);

            // Slide up and fade out the current page
            currentDiv.style.opacity = '0';
            currentDiv.style.transform = 'translateY(-20px)';

            setTimeout(() => {
                currentDiv.classList.remove('active');
                
                // Reset inline styles for future use
                currentDiv.style.opacity = '';
                currentDiv.style.transform = '';

                // Slide up and fade in the next page
                nextDiv.classList.add('active');
                
                let btnId = (currentPage + 1) === 5 ? 'btn-container5' : `btn${currentPage + 1}`;
                typeWriter(scripts[currentPage], `text${currentPage + 1}`, btnId);
                
            }, 600); // Wait for the 0.6s CSS transition to finish before swapping
        }

        // Start animation on load
        window.onload = () => {
            typeWriter(scripts[0], "text1", "btn1");
        };

        // Smooth Evasive Button
        function moveNoButton() {
            const btn = document.getElementById('btn-no');
            // Generate larger random coordinates for it to run away to
            const x = (Math.random() * 200) - 100; 
            const y = (Math.random() * 150) - 75; 
            btn.style.transform = `translate(${x}px, ${y}px)`;
        }

        function accepted() {
            const page5 = document.getElementById('page5');
            // Smooth fade out of everything, fade in response
            page5.style.opacity = '0';
            
            setTimeout(() => {
                page5.innerHTML = `
                    <div style="animation: wordFadeIn 1s ease forwards;">
                        <h1 style="color: #ff477e; font-size: 2.5rem;">YAYYY! 🎉</h1>
                        <p style="font-size: 1.5rem; line-height: 1.5;">I promise to make you the happiest! ❤️🥰💐</p>
                    </div>`;
                page5.style.opacity = '1';
            }, 600);
        }
    </script>
</body>
</html>
